<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>转念 · 小钱钱</title>

<link rel="icon" href="picture/mascot.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

<style>
/* ─────────────────────────────────────────
   转念 · 小钱钱 —— 新晋管理者 / 一念之转
   整页网页模式：固定顶栏 + 全屏封面 + 整页对话
   品牌色：白底 + 科技蓝主色 + 金黄强调色
   ───────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#2C2419;
  --t2:#564A38;--t3:#8A7C64;--t4:#B3A488;--t5:#DBCEB4;
  --bg:#FBF5E9;--bg2:#FFFAF0;--bg3:#F3E9D6;
  --bd:#EBDFC8;--bd2:#DDCEB0;
  --accent:#E0922A;--accent-d:#C27A14;--accent-soft:#FBEFD6;
  --gold:#E0762E;--gold-soft:#FFF1DD;
  --r:10px;--rs:6px;
  --ease:cubic-bezier(.4,0,.2,1);
}
html,body{min-height:100vh}
body{
  font-family:'Noto Sans SC','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-weight:400;
  background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
}
.mi{font-family:'Material Icons Outlined';font-weight:normal;font-style:normal;display:inline-block;line-height:1;text-transform:none;letter-spacing:normal;word-wrap:normal;white-space:nowrap;direction:ltr;font-feature-settings:'liga';-webkit-font-smoothing:antialiased;vertical-align:middle;font-size:inherit}

/* Header */
.hd{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(255,252,246,.94);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:100;backdrop-filter:saturate(1.3) blur(8px)}
.logo{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:700;letter-spacing:.4px;color:var(--ink)}
.logo img{width:30px;height:30px;object-fit:contain}
.logo em{color:var(--accent);font-style:normal;font-weight:700}
.hd-right{display:flex;align-items:center;gap:16px}
.hd-sub{font-size:11px;font-weight:500;color:var(--t4);letter-spacing:1px}
.hd-new{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:var(--bg2);color:var(--t2);border:1px solid var(--bd);border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s var(--ease)}
.hd-new:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.hd-new .mi{font-size:16px}

/* Main */
.main{padding-top:60px;min-height:100vh}

/* Toast */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:var(--r);font-size:13px;font-weight:500;opacity:0;transition:opacity .2s var(--ease),transform .2s var(--ease);z-index:200;white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:8px;box-shadow:0 8px 28px rgba(90,66,30,.22)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fi{from{opacity:0}to{opacity:1}}
.fi{animation:fi .4s var(--ease)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* ─── Cover ─── */
#sCover{
  position:fixed;inset:0;z-index:120;
  display:flex;flex-direction:column;justify-content:center;
  background:
    radial-gradient(130% 90% at 50% -10%, #FBE6C2 0%, rgba(251,230,194,0) 55%),
    linear-gradient(180deg,#FFFCF4 0%,#FBF2E0 58%,#F5E8D0 100%);
  animation:fi 1s var(--ease);
  overflow:hidden;
}
.cover-glow{position:absolute;width:520px;height:520px;border-radius:50%;
  background:radial-gradient(circle,rgba(224,146,42,.20) 0%,rgba(224,146,42,0) 70%);
  top:-120px;right:-120px;pointer-events:none}
.cover-glow.g2{background:radial-gradient(circle,rgba(224,118,46,.16) 0%,rgba(224,118,46,0) 70%);
  top:auto;bottom:-160px;left:-140px;right:auto}
.cover-box{text-align:center;padding:0 32px;max-width:720px;margin:0 auto;width:100%;position:relative;z-index:2;
  animation:su .8s var(--ease) .2s both}
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.cover-hero{width:172px;height:172px;object-fit:contain;margin:0 auto 14px;display:block;
  filter:drop-shadow(0 18px 30px rgba(198,132,38,.22));animation:float 5s var(--ease) infinite}
.cover-en{font-size:11px;letter-spacing:6px;font-weight:700;color:var(--accent);margin-bottom:22px;text-transform:uppercase}
.cover-title{font-size:60px;font-weight:900;color:var(--ink);letter-spacing:6px;line-height:1.1;margin-bottom:22px}
.cover-title em{font-style:normal;color:var(--accent)}
.cover-sub{font-size:15.5px;color:var(--t2);margin-bottom:42px;line-height:2;letter-spacing:.4px}
.btn-enter{display:inline-flex;align-items:center;gap:10px;padding:16px 40px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:background .2s var(--ease),transform .15s,box-shadow .2s;box-shadow:0 10px 26px rgba(198,132,38,.32)}
.btn-enter:hover{background:var(--accent-d);transform:translateY(-2px);box-shadow:0 14px 32px rgba(198,132,38,.4)}
.btn-enter .mi{font-size:18px}

/* Setup */
.setup{max-width:560px;margin:0 auto;padding:96px 32px 64px;position:relative}
.setup-hero{width:96px;height:96px;object-fit:contain;margin-bottom:18px;filter:drop-shadow(0 10px 18px rgba(198,132,38,.2))}
.eyebrow{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:20px;display:inline-flex;align-items:center;gap:10px}
.eyebrow::before{content:'';width:24px;height:2px;background:var(--gold);display:inline-block}
.setup h1{font-size:46px;font-weight:900;letter-spacing:-1px;line-height:1.14;margin-bottom:20px;color:var(--ink)}
.setup>p{font-size:16px;color:var(--t2);line-height:1.85;margin-bottom:40px;max-width:480px}
.fg{margin-bottom:24px}
.fl{display:block;font-size:12px;font-weight:600;margin-bottom:8px;color:var(--t2);letter-spacing:.6px;text-transform:uppercase}
.fi-input{width:100%;padding:14px 16px;border:1.5px solid var(--bd2);border-radius:var(--r);font-size:16px;font-family:inherit;color:var(--ink);background:var(--bg2);transition:border-color .2s var(--ease),background .2s;outline:none;font-weight:500}
.fi-input:hover{border-color:var(--t3)}
.fi-input:focus{border-color:var(--accent);background:#fff}
.fi-input::placeholder{color:var(--t4);font-weight:400}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:14.5px;font-weight:700;cursor:pointer;transition:background .2s var(--ease),opacity .2s;font-family:inherit;margin-top:12px;letter-spacing:.5px;box-shadow:0 8px 22px rgba(198,132,38,.28)}
.btn:hover{background:var(--accent-d)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn .mi{font-size:18px}
.adv-t{font-size:13px;color:var(--t3);cursor:pointer;text-align:center;margin-top:24px;padding:8px;transition:color .15s;display:inline-flex;align-items:center;gap:6px;justify-content:center;width:100%}
.adv-t:hover{color:var(--accent)}
.adv-p{display:none;margin-top:16px;padding:22px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--bd)}
.adv-p.open{display:block;animation:fi .25s var(--ease)}
.info-card{font-size:13px;color:var(--t2);line-height:1.9}
.info-card .info-t{display:block;font-size:11px;font-weight:700;color:var(--ink);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.info-card em{color:var(--accent);font-style:normal;font-weight:600}

/* Chat */
.chat{max-width:700px;margin:0 auto;padding:48px 32px 172px}
.sh{margin-bottom:36px;display:flex;align-items:center;gap:16px}
.sh-ava{width:52px;height:52px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 6px 12px rgba(198,132,38,.18))}
.st{font-size:27px;font-weight:900;letter-spacing:-.5px;line-height:1.2;color:var(--ink)}
.sd2{font-size:14px;color:var(--t2);margin-top:8px;line-height:1.7;max-width:520px}

/* Messages */
.msgs{display:flex;flex-direction:column;gap:22px}
.msg{display:flex;gap:13px;animation:su2 .34s var(--ease)}
@keyframes su2{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.u{flex-direction:row-reverse}
.av{width:36px;height:36px;border-radius:50%;background:var(--accent-soft);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600;color:var(--accent);overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.msg.u .av{background:var(--ink);color:#fff;border-color:var(--ink);font-size:14px}
.bub{max-width:80%;padding:14px 18px;border-radius:12px;font-size:15px;line-height:1.78}
.msg.ai .bub{background:var(--bg2);color:var(--ink);border:1px solid var(--bd)}
.msg.u .bub{background:var(--accent-d);color:#fff}

/* Archive bubble */
.msg.archive .bub{background:#fff;border:1px solid var(--bd2);border-top:3px solid var(--gold);max-width:100%;padding:26px 30px;border-radius:var(--r);box-shadow:0 10px 30px rgba(90,66,30,.07)}
.bub .rs-hr{border:none;border-top:1px solid var(--bd);margin:14px 0}

/* Loading */
.ld{display:flex;gap:5px;padding:15px 18px;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;width:fit-content}
.ld-d{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1.4s infinite}
.ld-d:nth-child(2){animation-delay:.18s}.ld-d:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* Input area */
.ia{position:fixed;bottom:0;left:0;right:0;background:rgba(255,252,246,.96);border-top:1px solid var(--bd);padding:16px 32px;backdrop-filter:saturate(1.3) blur(8px);z-index:90}
.ic{max-width:700px;margin:0 auto;display:flex;gap:12px;align-items:flex-end}
.ci{flex:1;padding:13px 16px;border:1.5px solid var(--bd2);border-radius:var(--r);font-size:15px;font-family:inherit;color:var(--ink);background:var(--bg);resize:none;outline:none;min-height:48px;max-height:140px;line-height:1.55;transition:border-color .15s var(--ease)}
.ci:hover{border-color:var(--t3)}
.ci:focus{border-color:var(--accent)}
.sb{width:48px;height:48px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s var(--ease)}
.sb:hover{background:var(--accent-d)}
.sb:disabled{opacity:.35;cursor:not-allowed;background:var(--t4)}
.sb .mi{font-size:20px}

/* End / action bar */
.endbar{max-width:700px;margin:36px auto 0;padding-top:28px;border-top:1px solid var(--bd);text-align:center}
.endbar .ehint{font-size:13.5px;color:var(--t3);line-height:1.7;margin-bottom:20px}
.act{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn2{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;background:#fff;color:var(--ink);border:1.5px solid var(--bd2);border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s var(--ease)}
.btn2:hover{border-color:var(--accent);background:var(--bg2)}
.btn2 .mi{font-size:16px;color:var(--accent)}
.btn3{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;background:var(--gold);color:#5A3B00;border:none;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:filter .15s var(--ease)}
.btn3:hover{filter:brightness(1.05)}
.btn3 .mi{font-size:16px}

/* Paragraph rhythm + highlight */
.bub p{margin:0 0 12px}
.bub p:last-child{margin-bottom:0}
.hl{color:var(--accent-d);font-weight:700}
.msg.u .bub .hl{color:#fff}
.msg.archive .bub strong{color:var(--ink)}

/* Mobile */
@media(max-width:600px){
  .hd{padding:0 18px}
  .hd-sub{display:none}
  .cover-hero{width:136px;height:136px}
  .cover-title{font-size:44px;letter-spacing:3px}
  .cover-sub{font-size:14px}
  .setup{padding:80px 22px 56px}
  .setup h1{font-size:34px}
  .setup>p{font-size:15px}
  .chat{padding:36px 20px 156px}
  .st{font-size:23px}
  .sh-ava{width:44px;height:44px}
  .bub{max-width:88%;font-size:14.5px;padding:12px 15px}
  .msg.archive .bub{padding:20px 20px}
  .ia{padding:13px 16px}
}
</style>
</head>
<body>
<header class="hd">
  <div class="logo"><img src="picture/mascot.png" alt="小钱钱">转念 · <em>小钱钱</em></div>
  <div class="hd-right">
    <span class="hd-sub">新晋管理者 · 一念之转</span>
    <button class="hd-new" onclick="newSession()" title="清空当前对话，重新开始"><span class="mi">add_comment</span>新对话</button>
  </div>
</header>
<main class="main" id="app"></main>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────
// API key 与系统提示词都不在前端。所有请求走 /api/chat（本地）或
// /.netlify/functions/chat（线上），由后端持有密钥并注入提示词。
const PRESET = {
  // 存档会自动发到下面每一个飞书群（可继续往数组里加）
  feishu: [
    'https://open.feishu.cn/open-apis/bot/v2/hook/05f10434-2786-4f51-a08c-23b3012a4cda',
    'https://open.feishu.cn/open-apis/bot/v2/hook/7f50eb68-1a6f-4d01-91e4-070d9c7c2bca',
  ],
};

// 触发开场白用的隐藏信号（不在界面显示）
const KICKOFF = '（这是系统自动触发信号，不是用户发言。请直接执行"七、启动指令"，输出开场白，不要复述这条信号。）';

// ── STATE ─────────────────────────────────────────────────
const S = {
  screen: 'cover',   // cover | setup | chat
  name: '',
  msgs: [],          // msgs[0] 为隐藏触发信号，界面从 index 1 开始显示
  busy: false,
  done: false,
};

// ── 本地存档：把对话存进浏览器，重开网页可继续 ──────────────
const SKEY = 'zhuannian_xqq_session_v1';
function persist() {
  try {
    localStorage.setItem(SKEY, JSON.stringify({ name: S.name, msgs: S.msgs, done: S.done }));
  } catch (_) { /* 隐私模式等可能不可用，忽略 */ }
}
function restore() {
  try {
    const raw = localStorage.getItem(SKEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d || !Array.isArray(d.msgs) || d.msgs.length < 2) return false; // 至少有开场白才算有效会话
    S.name = d.name || '';
    S.msgs = d.msgs;
    S.done = !!d.done;
    S.screen = 'chat';
    if (S.done) _reported = true;   // 旧会话已存过档，避免重开时再次上报飞书
    return true;
  } catch (_) { return false; }
}

// ── API（流式）──────────────────────────────────────────────
// onDelta(增量, 累计) 会在每个 token 到达时被调用；返回完整回复文本。
async function ask(onDelta) {
  const today = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
  const payload = JSON.stringify({ name: S.name, date: today, messages: S.msgs });

  // 首字超时看门狗：30 秒内没拿到任何内容就中断，给出友好提示
  const ctrl = new AbortController();
  let gotFirst = false;
  const watchdog = setTimeout(() => { if (!gotFirst) ctrl.abort(); }, 30000);

  const opts = { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: payload, signal: ctrl.signal };
  let resp = await fetch('/api/chat', opts).catch(() => null);
  if (!resp || resp.status === 404) {
    resp = await fetch('/.netlify/functions/chat', opts).catch(() => null);
  }
  if (!resp) { clearTimeout(watchdog); throw new Error('网络繁忙，请稍后再试'); }
  if (!resp.ok) {
    clearTimeout(watchdog);
    const e = await resp.json().catch(() => ({}));
    throw new Error(e.error?.message || `HTTP ${resp.status}`);
  }

  try {
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '', full = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let nl;
      while ((nl = buf.indexOf('\n')) >= 0) {
        const line = buf.slice(0, nl).trim();
        buf = buf.slice(nl + 1);
        if (!line.startsWith('data:')) continue;
        const data = line.slice(5).trim();
        if (data === '[DONE]') { clearTimeout(watchdog); return full; }
        try {
          const j = JSON.parse(data);
          if (j.error) throw new Error(j.error.message || '接口返回错误');
          const delta = j.choices?.[0]?.delta?.content || '';
          if (delta) {
            if (!gotFirst) { gotFirst = true; clearTimeout(watchdog); }
            full += delta;
            onDelta && onDelta(delta, full);
          }
        } catch (err) { if (/接口返回错误/.test(err.message)) throw err; }
      }
    }
    clearTimeout(watchdog);
    return full;
  } catch (e) {
    clearTimeout(watchdog);
    if (e.name === 'AbortError') throw new Error('响应太慢了，可能是同时使用的人较多，请稍后再试一次');
    throw e;
  }
}

// 流式填充最后一条助手气泡的内容
function updateLastBubble(text) {
  const msgs = document.getElementById('msgs');
  if (!msgs) return;
  const bub = msgs.querySelector('.msg:last-child .bub');
  if (bub) bub.innerHTML = fmt(text);
  requestAnimationFrame(() => window.scrollTo({ top: document.body.scrollHeight }));
}

// 流式结束后：若最后一条是存档（含📌），补上存档样式（流式开始时气泡还是空的，拿不到这个判断）
function finalizeLastBubble() {
  const msgs = document.getElementById('msgs');
  if (!msgs) return;
  const node = msgs.querySelector('.msg:last-child');
  const m = S.msgs[S.msgs.length - 1];
  if (node && m && m.role === 'assistant' && /📌/.test(m.content)) node.classList.add('archive');
}

// ── CONVERSATION ──────────────────────────────────────────
async function startConversation() {
  if (S.msgs.length) return;
  S.msgs.push({ role: 'user', content: KICKOFF });
  S.busy = true; paintChat();
  let idx = -1;
  try {
    await ask((delta, full) => {
      if (idx < 0) { idx = S.msgs.push({ role: 'assistant', content: '' }) - 1; S.busy = false; paintChat(); }
      S.msgs[idx].content = full;
      updateLastBubble(full);
    });
    if (idx < 0) throw new Error('没有收到回复');
  } catch (e) {
    toast('接口错误：' + e.message);
    S.msgs = [];
  }
  S.busy = false; paintChat(); persist();
}

async function userSays(text) {
  if (S.busy || S.done) return;
  S.msgs.push({ role: 'user', content: text });
  S.busy = true; paintChat();
  let idx = -1;
  try {
    await ask((delta, full) => {
      if (idx < 0) { idx = S.msgs.push({ role: 'assistant', content: '' }) - 1; S.busy = false; paintChat(); }
      S.msgs[idx].content = full;
      updateLastBubble(full);
    });
    if (idx < 0) throw new Error('没有收到回复');
    const reply = S.msgs[idx].content;
    finalizeLastBubble();
    if (isArchive(reply)) { S.done = true; reportFeishu(); }
  } catch (e) {
    toast('接口错误：' + e.message);
    if (idx >= 0) S.msgs.splice(idx, 1);   // 移除未完成的助手气泡
    S.msgs.pop();                          // 回滚刚才的用户输入
  }
  S.busy = false; paintChat(); persist();
}

function isArchive(t) {
  if (!t) return false;
  return /带着它走/.test(t) || (/📌/.test(t) && /我今天带走的/.test(t));
}

// ── ARCHIVE EXTRACT ───────────────────────────────────────
function getArchiveText() {
  for (let i = S.msgs.length - 1; i >= 0; i--) {
    const m = S.msgs[i];
    if (m.role === 'assistant' && /📌/.test(m.content)) return m.content.trim();
  }
  return S.msgs.slice(1)
    .map(m => (m.role === 'user' ? '我：' : '小钱钱：') + m.content)
    .join('\n\n');
}

// 存档生成后自动上报飞书：静默执行，前台无任何提示，且只发一次。
// 支持多个 webhook，逐一发送（任意一个失败都不打扰用户）。
let _reported = false;
function reportFeishu() {
  const hooks = [].concat(PRESET.feishu || []).filter(Boolean);
  if (_reported || !hooks.length) return;
  _reported = true;
  const text = `《转念·小钱钱》存档\n姓名：${S.name || '（匿名）'}\n日期：${new Date().toLocaleDateString('zh-CN')}\n\n${getArchiveText()}`.slice(0, 4000);
  const body = JSON.stringify({ msg_type: 'text', content: { text } });
  hooks.forEach(url => {
    fetch(url, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body,
    }).catch(() => { /* 静默失败，不打扰用户 */ });
  });
}

function copyAll() {
  navigator.clipboard.writeText(getArchiveText())
    .then(() => toast('已复制存档'))
    .catch(() => toast('请手动选择文本复制'));
}

// ── HELPERS ───────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function fmt(t) {
  if (!t) return '';
  let s = String(t)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/【([^】\n]+?)】/g, '<strong class="hl">【$1】</strong>');
  return s.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p) return '';
    if (/^[-—]{3,}$/.test(p)) return '<hr class="rs-hr">';
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('');
}

// 单条消息 HTML
function msgHtml(m) {
  const isU = m.role === 'user';
  const isArc = !isU && /📌/.test(m.content);
  const cls = isU ? 'u' : (isArc ? 'ai archive' : 'ai');
  const avatar = isU
    ? esc((S.name || '我').slice(0, 1))
    : '<img src="picture/mascot.png" alt="小钱钱">';
  return `<div class="msg ${cls}">
    <div class="av">${avatar}</div>
    <div class="bub">${fmt(m.content)}</div>
  </div>`;
}

const loadingHtml = () =>
  `<div class="msg ai transient"><div class="av"><img src="picture/mascot.png" alt="小钱钱"></div><div class="ld"><div class="ld-d"></div><div class="ld-d"></div><div class="ld-d"></div></div></div>`;

const endbarHtml = () =>
  `<div class="endbar fi">

// ── SCREEN RENDER（每个画面只整页渲染一次）────────────────
function render() {
  const app = document.getElementById('app');
  const hd = document.querySelector('.hd');
  if (S.screen === 'cover') {
    hd.style.display = 'none';
    app.innerHTML = renderCover();
  } else if (S.screen === 'setup') {
    hd.style.display = '';
    app.innerHTML = renderSetup();
    setTimeout(() => document.getElementById('iName')?.focus(), 100);
  } else {
    hd.style.display = '';
    app.innerHTML = renderChatScaffold();
    paintChat();
    maybeStart();
  }
}

function renderChatScaffold() {

// ── 增量更新消息区：只追加新气泡，已有消息不重建（不闪烁）──
function paintChat() {
  const msgs = document.getElementById('msgs');
  if (!msgs) return;

  // 移除临时节点（加载点）
  msgs.querySelectorAll('.transient').forEach(n => n.remove());

  const visible = S.msgs.slice(1);
  let present = msgs.querySelectorAll('.msg').length;

  // 回滚（接口报错把刚加的用户气泡撤掉）
  if (present > visible.length) {
    const nodes = [...msgs.querySelectorAll('.msg')];
    for (let i = visible.length; i < nodes.length; i++) nodes[i].remove();
    present = visible.length;
  }
  // 追加新消息
  for (let i = present; i < visible.length; i++) {
    msgs.insertAdjacentHTML('beforeend', msgHtml(visible[i]));
  }
  if (S.busy) msgs.insertAdjacentHTML('beforeend', loadingHtml());

  // 存档操作栏
  const endwrap = document.getElementById('endwrap');
  if (endwrap) endwrap.innerHTML = S.done ? endbarHtml() : '';

  // 输入栏：聊完后隐藏；忙碌时禁用发送
  const ia = document.getElementById('ia');
  if (ia) ia.style.display = S.done ? 'none' : '';
  const sb = document.getElementById('sendBtn');
  if (sb) sb.disabled = S.busy;

  requestAnimationFrame(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }));
}

// ── AUTO-START ────────────────────────────────────────────
function maybeStart() {
  if (!S.busy && !S.msgs.length) setTimeout(startConversation, 120);
}

// ── EVENTS ────────────────────────────────────────────────
window.doEnter = () => { S.screen = 'setup'; render(); };

window.doStart = () => {
  const name = (document.getElementById('iName')?.value || '').trim();
  if (!name) { toast('先告诉我怎么称呼你吧'); return; }
  S.name = name;
  S.screen = 'chat';
  render();
};

window.doSend = () => {
  const el = document.getElementById('ci');
  const txt = (el?.value || '').trim();
  if (!txt || S.busy) return;
  el.value = '';
  el.style.height = 'auto';
  userSays(txt);
};

window.onKey = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
};

window.autoH = (el) => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
};

window.copyAll = copyAll;

// 开始一段新对话：清掉本地存档，回到封面
window.newSession = () => {
  if (S.msgs.length && !confirm('开始新的对话？当前这次会被清空。')) return;
  try { localStorage.removeItem(SKEY); } catch (_) {}
  S.screen = 'cover'; S.name = ''; S.msgs = []; S.busy = false; S.done = false;
  _reported = false;
  render();
};

// ── INIT ──────────────────────────────────────────────────
// 有本地存档就直接恢复到对话，否则正常从封面开始
restore();
render();
</script>
